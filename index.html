<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="styles.css">
    <title>Network Documentation Tool</title>
</head>
<body>

    <h1>Network Documentation Tool</h1>

    <form action="save_device.php" method="POST">

        <label>Device Name:</label><br>
        <input type="text" name="device_name" required><br><br>

        <label>Device Type:</label><br>
        <input type="text" name="device_type" required><br><br>

        <label>IP Address:</label><br>
        <input type="text" name="ip_address" required><br><br>

        <label>MAC Address:</label><br>
        <input type="text" name="mac_address"><br><br>

        <label>Location:</label><br>
        <input type="text" name="location"><br><br>

        <label>Assigned User:</label><br>
        <input type="text" name="assigned_user"><br><br>

        <label>Status:</label><br>
        <select name="status">
            <option>Active</option>
            <option>Inactive</option>
            <option>Maintenance</option>
        </select><br><br>

        <label>Notes:</label><br>
        <textarea name="notes"></textarea><br><br>

        <button type="submit">Save Device</button>

    </form>

</body>
</html>
